



<!DOCTYPE html>
<html>
<head>
<title>Doctors</title>
</head>

<body style="margin:0;font-family:Arial;background:linear-gradient(135deg,#e3f2fd,#f1f8ff);">

<div style="background:#1976d2;color:white;padding:20px;text-align:center;">
<h1>🏥 Doctors List</h1>
</div>

<div style="width:90%;max-width:1000px;margin:40px auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:25px;">

{% for doctor in doctors %}

<div style="background:white;padding:20px;border-radius:12px;box-shadow:0 6px 15px rgba(0,0,0,0.15);">

<h3 style="color:#1976d2;">👨‍⚕️ Dr {{ doctor.name }}</h3>

<p><b>Specialty:</b> {{ doctor.specialty }}</p>
<p><b>Experience:</b> {{ doctor.experience }} years</p>
<p><b>Consultation Fee:</b> ₹{{ doctor.fee }}</p>

<a href="/doctor/{{ doctor.id }}"
style="background:#1976d2;color:white;padding:10px 18px;text-decoration:none;border-radius:6px;">
View Profile
</a>

</div>

{% endfor %}

</div>

</body>
</html>
